services:
  # ----------------------------------------
  # 1. Backend (Node.js/Express)
  # ----------------------------------------
  - type: web
    name: cadmarket-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # You must set this manually in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a strong secret automatically
      - key: JWT_EXPIRES_IN
        value: 7
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        # Render will automatically inject the frontend URL here
        value: "https://cadmarket-frontend.onrender.com"

  # ----------------------------------------
  # 2. Frontend (Vite + React)
  # ----------------------------------------
  - type: web
    name: cadmarket-frontend
    env: static
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    staticPublishPath: dist
    # Rewrite rules for React Router (Single Page Application)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # This points to the backend service we define above
        fromService:
          type: web
          name: cadmarket-backend
          envVarKey: RENDER_EXTERNAL_URL
        # We append /api to the base URL
      - key: VITE_RAZORPAY_KEY_ID
        sync: false # You must set this manually in the Render Dashboard
